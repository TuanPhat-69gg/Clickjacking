<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Xác Thực Giao Dịch Chuyển Tiền</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .bank-card { width: 350px; background: #ffffff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); overflow: hidden; border: 1px solid #e1e5eb; }
        .bank-header { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; padding: 15px; font-size: 16px; font-weight: bold; text-align: center; letter-spacing: 0.5px; }
        .bank-body { padding: 20px; color: #333333; text-align: left; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; border-bottom: 1px dashed #f0f0f0; padding-bottom: 6px; }
        .info-label { color: #666666; }
        .info-value { font-weight: 600; color: #111111; }
        .otp-box { margin-top: 15px; text-align: center; }
        .otp-input { width: 90%; padding: 10px; border: 1px solid #cccccc; border-radius: 6px; text-align: center; font-size: 16px; letter-spacing: 5px; font-weight: bold; background: #fafafa; }
        .btn-submit { background: #00a86b; color: white; width: 100%; height: 45px; font-size: 15px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 15px; transition: background 0.2s; box-shadow: 0 3px 6px rgba(0,168,107,0.2); }
        .btn-submit:hover { background: #008f5a; }
    </style>
</head>
<body>

    <div class="bank-card">
        <div class="bank-header">SMART BANKING DIGITAL</div>
        <div class="bank-body">
            <div class="info-row">
                <span class="info-label">Tài khoản nguồn:</span>
                <span class="info-value">0987****123</span>
            </div>
            <div class="info-row">
                <span class="info-label">Số tài khoản nhận:</span>
                <span class="info-value">2033230218</span>
            </div>
            <div class="info-row">
                <span class="info-label">Số tiền giao dịch:</span>
                <span class="info-value" style="color: #d9534f;">5,000,000 VND</span>
            </div>
            
            <div class="otp-box">
                <input type="text" class="otp-input" placeholder="------" maxlength="6" value="652913" disabled>
            </div>
            
            <button class="btn-submit" onclick="alert('Báo cáo Lab: Hệ thống đã thực thi thành công lệnh XÁC THỰC CHUYỂN TIỀN ngầm!')">
                XÁC NHẬN GIAO DỊCH
            </button>
        </div>
    </div>

</body>
</html>
